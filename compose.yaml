services:
  caddy:
    image: caddy:2-alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      web:
        condition: service_started
      api:
        condition: service_started
    restart: unless-stopped

  web:
    build:
      context: .
      dockerfile: ops/docker/Dockerfile.web
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=development
      - PUBLIC_API_URL=http://localhost:3001
    depends_on:
      api:
        condition: service_started
    restart: unless-stopped

  api:
    build:
      context: .
      dockerfile: ops/docker/Dockerfile.api
    ports:
      - "3001:3001"
    environment:
      - NODE_ENV=development
      - API_PORT=3001
      - DATABASE_URL=postgres://pish:pish@postgres:5432/pish
      - VALKEY_URL=redis://valkey:6379
      - MEILISEARCH_URL=http://meilisearch:7700
      - MEILISEARCH_KEY=pish-dev-key
    depends_on:
      postgres:
        condition: service_healthy
      valkey:
        condition: service_healthy
      meilisearch:
        condition: service_started
    restart: unless-stopped

  worker:
    build:
      context: .
      dockerfile: ops/docker/Dockerfile.worker
    environment:
      - NODE_ENV=development
      - DATABASE_URL=postgres://pish:pish@postgres:5432/pish
      - VALKEY_URL=redis://valkey:6379
      - MEILISEARCH_URL=http://meilisearch:7700
      - MEILISEARCH_KEY=pish-dev-key
    depends_on:
      postgres:
        condition: service_healthy
      valkey:
        condition: service_healthy
    restart: unless-stopped

  postgres:
    image: postgis/postgis:17-3.5-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: pish
      POSTGRES_PASSWORD: pish
      POSTGRES_DB: pish
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pish"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  valkey:
    image: valkey/valkey:8-alpine
    ports:
      - "6379:6379"
    volumes:
      - valkey_data:/data
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  meilisearch:
    image: getmeili/meilisearch:v1.12
    ports:
      - "7700:7700"
    environment:
      MEILI_MASTER_KEY: pish-dev-key
      MEILI_ENV: development
    volumes:
      - meili_data:/meili_data
    restart: unless-stopped

volumes:
  caddy_data:
  caddy_config:
  pg_data:
  valkey_data:
  meili_data:
